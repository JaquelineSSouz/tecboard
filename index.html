<!--color: cor da fonte-->

<!-- como o CSS respeita a questão de hieraquia (cascata) então o último estilo colocadfo será definido. Ex: se tivesse deixado a estilização in-line na tag p e também no style, seria válido apenas a in-line da tag p, pois ela está depois do style-->
